services:
  gzctf-bot:
    container_name: gzctf-discord-bot
    build: 
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped

    # Environment variables from .env file
    env_file:
      - .env

    # Docker volume for persistent data and logs
    volumes:
      - gzctf-bot-volume:/app

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "2G"
        max-file: "10"

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G

volumes:
  gzctf-bot-volume:
    driver: local

networks:
  default:
    driver: bridge