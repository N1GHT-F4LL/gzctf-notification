services:
  gzctf-bot:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: gzctf-discord-bot
    restart: unless-stopped
    
    # Environment variables from .env file
    env_file:
      - .env
    
    # Docker volumes for persistent data
    volumes:
      - gzctf-bot-data:/app/data
      - gzctf-bot-logs:/app/logs
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "1G"
        max-file: "5"

# Named volumes
volumes:
  gzctf-bot-data:
    driver: local
  gzctf-bot-logs:
    driver: local

networks:
  default:
    driver: bridge